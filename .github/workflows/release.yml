name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version in module.json
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" \
            '.version = $v | .download = "https://github.com/rune-goblin/pf2e-repeated-skill-challenge/releases/download/'"${GITHUB_REF_NAME}"'/pf2e-rsc.zip"' \
            module.json > module.tmp && mv module.tmp module.json

      - name: Build zip
        run: |
          zip -r pf2e-rsc.zip \
            module.json \
            scripts/ \
            packs/pf2e-rsc/ \
            pf2e-rsc.css

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pf2e-rsc.zip
            module.json
          generate_release_notes: true
